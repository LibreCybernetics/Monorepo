name: Kotlin Multiformats

on:
  push:
    paths:
    - '.github/workflows/'
    - 'kotlin/multiformats/**.kt'
    - 'spec/multiformats/'
  pull_request:
    branches: [ main ]
    paths:
    - '.github/workflows/'
    - 'kotlin/multiformats/**.kt'
    - 'spec/multiformats/'

jobs:
  test:
    defaults:
      run:
        working-directory: kotlin/multiformats
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Build with Gradle
      uses: gradle/gradle-build-action@v2
      with:
        arguments: test
        version: current
